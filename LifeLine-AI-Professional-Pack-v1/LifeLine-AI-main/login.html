<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>LifeLine AI Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="css/login.css">
<link rel="stylesheet" href="css/mobile.css">
</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="logo">

🚑

<h1>LifeLine AI</h1>

<p>Hospital ERP System</p>

</div>

<form id="loginForm">

<div class="input-group">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email"
required>

</div>

<div class="input-group">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

</div>

<button
class="login-btn">

Login

</button>

</form>

<p class="footer">

Emergency Response &
Hospital ERP

</p>

</div>

</div>

<script type="module"
src="js/auth/login.js"></script>

</body>

</html>
