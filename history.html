<!DOCTYPE html>
<html lang="en">

<head>
<script>
(function () {
    const savedTheme =
        localStorage.getItem("lifeline-theme");

    const prefersDark =
        window.matchMedia &&
        window.matchMedia(
            "(prefers-color-scheme: dark)"
        ).matches;

    const theme =
        savedTheme ||
        (prefersDark ? "dark" : "light");

    document.documentElement.setAttribute(
        "data-theme",
        theme
    );
})();
</script>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LifeLine AI | Emergency History</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/topbar.css">
<link rel="stylesheet" href="css/history.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/professional-ui.css">
</head>

<body>

<div class="sidebar">

<h1>🚑 LifeLine AI</h1>

<ul>

<li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>

<li><a href="hospital.html"><i class="fa-solid fa-truck-medical"></i> Emergency Panel</a></li>

<li><a href="patients.html"><i class="fa-solid fa-user-doctor"></i> Patients</a></li>

<li><a href="billing.html"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</a></li>

<li><a class="active" href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> History</a></li>

<li><a href="ambulance-map.html"><i class="fa-solid fa-map-location-dot"></i> Ambulance</a></li>

</ul>

</div>

<div class="main">

<div class="topbar">

<h2>📜 Emergency History</h2>
<button
    type="button"
    class="theme-toggle"
    data-theme-toggle
>
    <span class="theme-toggle-icon">
        🌙
    </span>

    <span class="theme-toggle-text">
        Dark Mode
    </span>
</button>
</div>

<div class="filters">

<input
type="text"
id="searchInput"
placeholder="🔍 Search Patient">

<select id="statusFilter">

<option value="">All Status</option>

<option>Pending</option>

<option>Accepted</option>

<option>Dispatched</option>

<option>Arrived</option>

<option>Completed</option>

<option>Rejected</option>

</select>

<select id="typeFilter">

<option value="">All Emergency</option>

<option>Road Accident</option>

<option>Heart Attack</option>

<option>Fire Accident</option>

<option>Stroke</option>

<option>Other</option>

</select>

</div>

<table>

<thead>

<tr>

<th>Date</th>

<th>Patient</th>

<th>Emergency</th>

<th>Hospital</th>

<th>Status</th>

<th>View</th>

</tr>

</thead>

<tbody id="historyBody">

</tbody>

</table>

</div>

<!-- Details Modal -->

<div id="historyModal" class="modal">

<div class="modal-content">

<span id="closeModal">&times;</span>

<h2>Emergency Details</h2>

<div id="modalBody"></div>

</div>

</div>

<script type="module" src="js/modules/history.js"></script>
<script type="module" src="js/modules/theme.js"></script>
<script type="module" src="js/modules/toast.js"></script>
</body>

</html>
