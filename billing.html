<!DOCTYPE html>
<html lang="en">

<head>
<script>
(function () {
    const savedTheme =
        localStorage.getItem("lifeline-theme");

    const prefersDark =
        window.matchMedia &&
        window.matchMedia(
            "(prefers-color-scheme: dark)"
        ).matches;

    const theme =
        savedTheme ||
        (prefersDark ? "dark" : "light");

    document.documentElement.setAttribute(
        "data-theme",
        theme
    );
})();
</script>
<meta charset="UTF-8">

content="width=device-width, initial-scale=1.0">
